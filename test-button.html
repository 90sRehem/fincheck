<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Border Radius Test</title>
    <style>
        .rounded {
            border-radius: 0.25rem;
        }
        
        .test-button {
            display: inline-flex;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            transition: colors 0.15s;
            user-select: none;
            height: 3rem;
            padding: 0 1.5rem;
            background-color: #087f5b;
            color: white;
            border: none;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Button Border Radius Test</h1>
    
    <div>
        <h2>Test 1: Basic rounded class</h2>
        <button class="test-button rounded">Button with .rounded</button>
        <button class="test-button">Button without .rounded</button>
    </div>
    
    <div>
        <h2>Test 2: Inline border-radius</h2>
        <button class="test-button" style="border-radius: 0.25rem;">Button with inline border-radius</button>
    </div>
    
    <div>
        <h2>Test 3: Different border-radius values</h2>
        <button class="test-button" style="border-radius: 4px;">4px border-radius</button>
        <button class="test-button" style="border-radius: 8px;">8px border-radius</button>
        <button class="test-button" style="border-radius: 12px;">12px border-radius</button>
    </div>
</body>
</html>
